version: "3.8"

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/var/lib/mysql
    networks:
      - webnetz

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - webnetz

  nginx:
    image: nginx:1.25
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - wordpress
    networks:
      - webnetz

  wordpress:
    image: wordpress:6.5-apache
    restart: unless-stopped
    environment:
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_HOST: mariadb
    volumes:
      - ./www:/var/www/html
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - mariadb
    networks:
      - webnetz

networks:
  webnetz:
    driver: bridge